name: Visual regression

# Reusable workflow: AI-assisted visual regression testing for capybara-storyboard.
#
# Flow (jobs run left-to-right; shoot-base and shoot-head run in PARALLEL):
#
#   targets ──┬──▶ shoot-base ──┐
#             └──▶ shoot-head ──┴──▶ compare
#
# - targets:     decide which specs to capture (git diff + optional Claude expansion).
# - shoot-base / shoot-head: check out each ref, run the target specs with
#   SCREENSHOTS=1, and upload the screenshots. They depend only on `targets`,
#   so they run concurrently.
# - compare:     download both screenshot sets, pixel-diff with reg-cli, have
#   Claude classify the changed images, and report to the PR. Never blocks the PR.
#
# Caller usage:
#   jobs:
#     visual-regression:
#       uses: aki77/capybara-storyboard/.github/workflows/visual-regression.yml@main
#       with:
#         ruby_version: "3.4"
#       secrets:
#         anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

on:
  workflow_call:
    inputs:
      base_ref:
        description: "Base ref to compare against (the expected side)."
        type: string
        required: false
        default: ${{ github.event.pull_request.base.ref }}
      ruby_version:
        description: "Ruby version passed to ruby/setup-ruby."
        type: string
        required: false
        default: "3.4"
      node_version:
        description: "Node.js version for reg-cli (requires Node 20+)."
        type: string
        required: false
        default: "20"
      reg_threshold:
        description: "reg-cli --thresholdRate (0..1). Fraction of changed pixels tolerated before an image counts as changed."
        type: string
        required: false
        default: "0"
      enable_claude:
        description: "Have Claude classify the changed diff images (intended / regression / uncertain)."
        type: boolean
        required: false
        default: true
      enable_claude_target_expansion:
        description: "Have Claude expand the target spec list from view-facing changes (view/template/component/CSS)."
        type: boolean
        required: false
        default: true
      model:
        description: "Model to pass to claude-code-action (via --model). Empty uses the action default."
        type: string
        required: false
        default: ""
      spec_paths:
        description: "Comma-separated spec subdirectories under spec/ to capture (e.g. system,components)."
        type: string
        required: false
        default: "system,components"
    secrets:
      anthropic_api_key:
        description: "Anthropic API key for claude-code-action. Only needed when Claude features are enabled."
        required: false

# reg-cli is pinned to a stable release. The npm `latest` tag is sometimes an
# RC (e.g. 0.19.0-rc0); 0.18.16 is the newest widely-used stable line.
env:
  REG_CLI_VERSION: "0.18.16"

permissions:
  contents: read
  pull-requests: write

jobs:
  # 1. Decide which spec files to capture on both sides.
  targets:
    runs-on: ubuntu-latest
    # Secrets can't be read in step `if:` expressions, so surface "is the key set?"
    # as a plain env var at the job level and gate on that instead.
    env:
      HAS_ANTHROPIC_KEY: ${{ secrets.anthropic_api_key != '' }}
    outputs:
      has_targets: ${{ steps.finalize.outputs.has_targets }}
    steps:
      - name: Check out head
        uses: actions/checkout@v4
        # Keep the persisted credentials (default): the next steps run
        # `git fetch` / `git diff`, which fail on a private caller repo without
        # the checkout token. fetch-depth: 0 gives the base..head history the
        # three-dot diff needs.
        with:
          fetch-depth: 0

      - name: Fetch base branch
        env:
          BASE_REF: ${{ inputs.base_ref }}
        run: git fetch origin "$BASE_REF"

      - name: Extract changed spec files from the diff
        id: extract
        env:
          BASE_REF: ${{ inputs.base_ref }}
          SPEC_PATHS: ${{ inputs.spec_paths }}
        run: |
          set -euo pipefail
          # Build an alternation like "system|components" from the comma-separated
          # input, and publish it as an output so the merge step below reuses the
          # exact same pattern instead of rebuilding it.
          pattern_body=$(printf '%s' "$SPEC_PATHS" | tr ',' '|' | tr -d '[:space:]')
          grep_pattern="^spec/(${pattern_body})/.*_spec\.rb$"
          echo "grep_pattern=${grep_pattern}" >> "$GITHUB_OUTPUT"
          echo "Using grep pattern: ${grep_pattern}"
          # `|| true` keeps the step alive when grep matches nothing (exit 1);
          # the trailing touch guarantees the file always exists, even empty.
          git diff --name-only --diff-filter=d \
            "origin/${BASE_REF}...HEAD" \
            | grep -E "${grep_pattern}" \
            > targets.txt || true
          touch targets.txt
          echo "Diff-derived targets:"
          cat targets.txt || true

      - name: Expand targets from view changes (Claude)
        if: ${{ inputs.enable_claude_target_expansion && env.HAS_ANTHROPIC_KEY == 'true' }}
        id: expand
        # Don't let a transient Claude/API failure fail the job: the merge step
        # degrades to the diff-derived targets when expansion produced nothing.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            You are selecting RSpec system/component specs to capture for a visual
            regression run on this pull request.

            A first pass already listed the spec files that changed directly in the
            diff. Your job is to find ADDITIONAL specs that are NOT in the diff but
            whose rendered output is likely affected by this PR, driven ONLY by
            view-facing changes: views, templates, partials, view components, and
            CSS/styling (e.g. app/views, app/components, *.html.erb, *.slim,
            *.haml, *.css, *.scss, and their component classes/templates).

            Do NOT use model changes as a starting point. Model changes (app/models,
            migrations, DB schema) usually do not change the rendered appearance, and
            starting from them causes over-selection, longer CI, and wasted tokens.
            Ignore changes that do not affect what a page looks like.

            Inspect the PR diff and the repository, then output the relative paths of
            the additional specs under ${{ inputs.spec_paths }} (as spec/<dir>/..._spec.rb)
            that should be captured. Only include specs that plausibly render the
            changed views. If there are none, return an empty list.
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*)"
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
            --json-schema '{"type":"object","additionalProperties":false,"required":["specs"],"properties":{"specs":{"type":"array","items":{"type":"string"},"description":"Relative spec file paths, e.g. spec/system/signup_spec.rb"}}}'

      - name: Merge expanded targets
        if: ${{ inputs.enable_claude_target_expansion && env.HAS_ANTHROPIC_KEY == 'true' }}
        env:
          STRUCTURED: ${{ steps.expand.outputs.structured_output }}
          GREP_PATTERN: ${{ steps.extract.outputs.grep_pattern }}
        run: |
          set -euo pipefail
          if [[ -z "${STRUCTURED}" ]]; then
            echo "No structured output from Claude; keeping diff-derived targets only."
            exit 0
          fi
          grep_pattern="$GREP_PATTERN"
          # Extract, validate against the same path pattern, and only keep files
          # that actually exist in the repo.
          printf '%s' "${STRUCTURED}" \
            | jq -r '(.specs // [])[]' \
            | grep -E "${grep_pattern}" \
            | while IFS= read -r spec; do
                if [[ -f "$spec" ]]; then echo "$spec"; fi
              done >> targets.txt || true
          # Deduplicate while preserving the file.
          sort -u targets.txt -o targets.txt
          echo "Targets after Claude expansion:"
          cat targets.txt

      - name: Finalize targets
        id: finalize
        run: |
          set -euo pipefail
          # Drop blank lines and deduplicate.
          if [[ -s targets.txt ]]; then
            grep -vE '^[[:space:]]*$' targets.txt | sort -u > targets.cleaned || true
            mv targets.cleaned targets.txt
          fi
          touch targets.txt
          if [[ -s targets.txt ]]; then
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Final targets:"
          cat targets.txt

      - name: Upload targets
        uses: actions/upload-artifact@v4
        with:
          name: vr-targets
          path: targets.txt
          if-no-files-found: error

  # 2a. Capture screenshots on the base branch (expected side).
  # shoot-base and shoot-head are near-identical; they're kept as two jobs for
  # readability. They could be collapsed into one `strategy.matrix: {side: [base, head]}`
  # job (still parallel) if the checkout-ref asymmetry is worked out.
  shoot-base:
    needs: targets
    if: ${{ needs.targets.outputs.has_targets == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out base ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_ref }}
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true

      - name: Download targets
        uses: actions/download-artifact@v4
        with:
          name: vr-targets

      - name: Capture screenshots (base)
        env:
          SCREENSHOTS: "1"
        run: |
          set -euo pipefail
          if [[ ! -s targets.txt ]]; then
            echo "No targets; nothing to capture."
            exit 0
          fi
          # Keep only targets that exist on THIS checked-out ref. A spec added in
          # the PR is absent on base_ref; passing it to rspec would raise a
          # LoadError and fail the job (and skip the whole compare/report). Such a
          # spec simply has no base screenshot — reg-cli reports it as a new item.
          : > existing_targets.txt
          while IFS= read -r spec; do
            [[ -z "$spec" ]] && continue
            [[ -f "$spec" ]] && echo "$spec" >> existing_targets.txt
          done < targets.txt
          if [[ ! -s existing_targets.txt ]]; then
            echo "No target specs exist on this ref; nothing to capture."
            exit 0
          fi
          # With SCREENSHOTS=1 every executed spec is captured. xargs passes each
          # newline-separated path as its own argument.
          xargs -a existing_targets.txt bundle exec rspec

      - name: Move screenshots into base/
        if: always()
        run: |
          set -euo pipefail
          mkdir -p base
          if [[ -d tmp/screenshots ]]; then
            mv tmp/screenshots/* base/ 2>/dev/null || true
          fi

      - name: Upload base screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vr-shots-base
          path: base
          if-no-files-found: ignore

  # 2b. Capture screenshots on the PR head (actual side). Independent of shoot-base,
  #     so it runs in parallel.
  shoot-head:
    needs: targets
    if: ${{ needs.targets.outputs.has_targets == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out head
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: true

      - name: Download targets
        uses: actions/download-artifact@v4
        with:
          name: vr-targets

      - name: Capture screenshots (head)
        env:
          SCREENSHOTS: "1"
        run: |
          set -euo pipefail
          if [[ ! -s targets.txt ]]; then
            echo "No targets; nothing to capture."
            exit 0
          fi
          # Keep only targets that exist on THIS checked-out ref. A spec added in
          # the PR is absent on base_ref; passing it to rspec would raise a
          # LoadError and fail the job (and skip the whole compare/report). Such a
          # spec simply has no base screenshot — reg-cli reports it as a new item.
          : > existing_targets.txt
          while IFS= read -r spec; do
            [[ -z "$spec" ]] && continue
            [[ -f "$spec" ]] && echo "$spec" >> existing_targets.txt
          done < targets.txt
          if [[ ! -s existing_targets.txt ]]; then
            echo "No target specs exist on this ref; nothing to capture."
            exit 0
          fi
          # With SCREENSHOTS=1 every executed spec is captured. xargs passes each
          # newline-separated path as its own argument.
          xargs -a existing_targets.txt bundle exec rspec

      - name: Move screenshots into head/
        if: always()
        run: |
          set -euo pipefail
          mkdir -p head
          if [[ -d tmp/screenshots ]]; then
            mv tmp/screenshots/* head/ 2>/dev/null || true
          fi

      - name: Upload head screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vr-shots-head
          path: head
          if-no-files-found: ignore

  # 3. Pixel-diff, classify, and report.
  #
  # Intentional: this job's `if:` references no status function, so Actions
  # implicitly ANDs `success()` of the needed jobs. That means if a target spec
  # fails on either side (shoot-base/shoot-head go red), compare is skipped and
  # no report is produced — by design. A failing spec is a real problem to fix
  # first; we do not diff/report against a partial, unreliable screenshot set.
  # (This is distinct from the "never block the PR" property, which is about the
  # compare job itself not failing the check once it does run.)
  compare:
    needs: [targets, shoot-base, shoot-head]
    if: ${{ needs.targets.outputs.has_targets == 'true' }}
    runs-on: ubuntu-latest
    # See the note on the targets job: secrets can't be read in step `if:`.
    env:
      HAS_ANTHROPIC_KEY: ${{ secrets.anthropic_api_key != '' }}
    steps:
      # In a reusable workflow the default checkout targets the CALLER repo,
      # which doesn't have these scripts. github.workflow_ref looks like
      # "owner/repo/.github/workflows/file.yml@ref"; take the "owner/repo" prefix
      # so we can check out THIS workflow's repo at github.workflow_sha instead.
      - name: Resolve this workflow's repository
        id: self
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}
        run: |
          set -euo pipefail
          repo="${WORKFLOW_REF%%/.github/*}"
          echo "repository=${repo}" >> "$GITHUB_OUTPUT"
          echo "Resolved workflow repository: ${repo}"

      - name: Check out this workflow's repo (for the .github/scripts helpers)
        uses: actions/checkout@v4
        # A shallow checkout is enough: this job runs the scripts and processes
        # the downloaded screenshots; it reads no git history.
        with:
          repository: ${{ steps.self.outputs.repository }}
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      # A side's artifact is absent when that side captured nothing (e.g. a PR
      # that only adds new specs has no base screenshots). download-artifact errors
      # on a missing name, so tolerate it and ensure the dirs exist — reg-cli then
      # treats the present side's images as new/deleted rather than failing the job.
      - name: Download base screenshots
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: vr-shots-base
          path: base

      - name: Download head screenshots
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: vr-shots-head
          path: head

      - name: Ensure screenshot dirs exist
        run: mkdir -p base head

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      # reg-cli is version-pinned, so the npm download cache keyed on that version
      # hits on every run after the first, skipping the re-download of npx below.
      - name: Cache reg-cli download
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-reg-cli-${{ env.REG_CLI_VERSION }}

      - name: Run reg-cli
        # Don't fail the job if reg-cli itself crashes (bad download, corrupt PNG,
        # etc.): this check must never block the PR. The parse step below runs with
        # if: always() and reports "no report produced" instead of a false all-clear.
        continue-on-error: true
        env:
          REG_THRESHOLD: ${{ inputs.reg_threshold }}
        run: |
          set -euo pipefail
          mkdir -p diff
          # reg-cli positional args are: actual expected diff.
          # head is the actual (PR) side, base is the expected side.
          # --ignoreChange keeps the exit code zero even when diffs exist; we do
          # our own gating below.
          npx --yes "reg-cli@${REG_CLI_VERSION}" ./head ./base ./diff \
            -J reg.json \
            -R report.html \
            --diffFormat png \
            --thresholdRate "$REG_THRESHOLD" \
            --ignoreChange

      - name: Parse reg report
        id: reg
        # Run even if reg-cli failed, so we can distinguish "no diff" from "reg-cli
        # never produced a report" and avoid a false "no differences" all-clear.
        if: always()
        run: |
          set -euo pipefail
          # reg_ok must use the SAME "exists AND parses" test that
          # parse-reg-report.sh uses to fall back to an empty report; otherwise a
          # corrupt reg.json yields reg_ok=true with zero counts, which reads as a
          # false "no differences" all-clear.
          if jq -e . reg.json >/dev/null 2>&1; then
            echo "reg_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "reg_ok=false" >> "$GITHUB_OUTPUT"
            echo "reg.json is missing or not valid JSON; reg-cli did not complete." >&2
          fi
          chmod +x .github/scripts/parse-reg-report.sh
          .github/scripts/parse-reg-report.sh reg.json "$GITHUB_OUTPUT"

      - name: Build Claude prompt
        id: prompt
        # Gate on total_count (failed + new + deleted), not just failed: a pure
        # step-sequence shift produces only new/deleted items, and classifying it
        # (so the report can explain the shift) is a primary goal of this workflow.
        if: ${{ inputs.enable_claude && env.HAS_ANTHROPIC_KEY == 'true' && steps.reg.outputs.total_count != '0' }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/build-claude-prompt.sh
          .github/scripts/build-claude-prompt.sh reg.json > claude-prompt.txt
          # Expose the prompt as a step output so it can be passed to the action's
          # `prompt` input (the action has no file-based prompt input).
          {
            echo "prompt<<CLAUDE_PROMPT_EOF"
            cat claude-prompt.txt
            echo "CLAUDE_PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "prompt_built=true" >> "$GITHUB_OUTPUT"

      - name: Classify diffs (Claude)
        id: classify
        if: ${{ steps.prompt.outputs.prompt_built == 'true' }}
        # Don't let a transient Claude/API failure fail the job: this check must
        # never block the PR. A failed run yields no usable output, so downstream
        # CLAUDE_RAN becomes false and the report says classification didn't run.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          claude_args: |
            --allowedTools "Read"
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
            --json-schema '{"type":"object","additionalProperties":false,"required":["results","overall_summary"],"properties":{"results":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["path","classification","summary"],"properties":{"path":{"type":"string"},"classification":{"type":"string","enum":["intended","regression","uncertain"]},"summary":{"type":"string"}}}},"overall_summary":{"type":"string"}}}'

      - name: Collect flagged images
        id: flagged
        if: always()
        env:
          # Pass Claude's structured output through an env var (never interpolated
          # into the script body) so its contents can't break out of the command.
          STRUCTURED_OUTPUT: ${{ steps.classify.outputs.structured_output }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/collect-flagged.sh
          printf '%s' "$STRUCTURED_OUTPUT" > structured_output.json
          .github/scripts/collect-flagged.sh structured_output.json diff flagged "$GITHUB_OUTPUT"

      - name: Upload flagged artifact
        id: upload-flagged
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vr-flagged
          path: flagged
          # Uncompressed so the Actions UI can natively preview each PNG.
          compression-level: 0
          if-no-files-found: ignore

      - name: Upload full artifact
        id: upload-full
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vr-full
          # base/ and head/ are already uploaded as vr-shots-base / vr-shots-head;
          # don't duplicate those (large) screenshot sets here.
          path: |
            report.html
            reg.json
            diff
          if-no-files-found: ignore

      - name: Build report body
        id: report
        if: always()
        env:
          REG_OK: ${{ steps.reg.outputs.reg_ok }}
          FAILED_COUNT: ${{ steps.reg.outputs.failed_count }}
          NEW_COUNT: ${{ steps.reg.outputs.new_count }}
          DELETED_COUNT: ${{ steps.reg.outputs.deleted_count }}
          REGRESSION_COUNT: ${{ steps.flagged.outputs.regression_count }}
          UNCERTAIN_COUNT: ${{ steps.flagged.outputs.uncertain_count }}
          INTENDED_COUNT: ${{ steps.flagged.outputs.intended_count }}
          FLAGGED_COUNT: ${{ steps.flagged.outputs.flagged_count }}
          # Derived from whether a usable results array actually came back, not
          # from the step outcome: claude-code-action exits 0 even when its own
          # run failed, so steps.classify.outcome would report success spuriously.
          CLAUDE_RAN: ${{ steps.flagged.outputs.classified }}
          STRUCTURED_FILE: structured_output.json
          FLAGGED_ARTIFACT_URL: ${{ steps.upload-flagged.outputs.artifact-url }}
          FULL_ARTIFACT_URL: ${{ steps.upload-full.outputs.artifact-url }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/build-report.sh
          .github/scripts/build-report.sh > report.md
          cat report.md

      - name: Write job summary
        if: ${{ always() && steps.report.outcome == 'success' }}
        run: cat report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment
        if: ${{ always() && steps.report.outcome == 'success' && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # One sticky comment per PR: edit the existing marker comment if present.
          marker="<!-- capybara-storyboard-visual-regression -->"
          { echo "$marker"; cat report.md; } > comment.md
          existing=$(gh pr view "$PR_NUMBER" --json comments \
            --jq '.comments | map(select(.body | contains("capybara-storyboard-visual-regression"))) | last | .url // empty' 2>/dev/null || true)
          if [[ -n "$existing" ]]; then
            comment_id=$(printf '%s' "$existing" | grep -oE '[0-9]+$' || true)
            if [[ -n "$comment_id" ]]; then
              gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
                -f body="$(cat comment.md)" >/dev/null
              echo "Updated existing comment ${comment_id}."
              exit 0
            fi
          fi
          gh pr comment "$PR_NUMBER" --body-file comment.md
